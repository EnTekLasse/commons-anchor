name: commons-anchor

services:
  postgres:
    image: postgres:16
    container_name: ca-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  energidata-ingest:
    build:
      context: .
      dockerfile: infra/docker/ingest.Dockerfile
    container_name: ca-energidata-ingest
    profiles:
      - jobs
    restart: "no"
    env_file:
      - .env
    environment:
      DW_HOST: postgres
      DW_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy

  power-price-transform:
    image: postgres:16
    container_name: ca-power-price-transform
    profiles:
      - jobs
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./infra/sql/transform:/sql/transform:ro
    command:
      - sh
      - -c
      - psql -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f /sql/transform/001_refresh_power_price_hourly.sql
    depends_on:
      postgres:
        condition: service_healthy

  mqtt:
    image: eclipse-mosquitto:2
    container_name: ca-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ca-grafana
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:v0.53.7
    container_name: ca-metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:
  mosquitto_data:
  mosquitto_log:
