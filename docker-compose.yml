name: commons-anchor

services:
  postgres:
    image: postgres:16
    container_name: ca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init:/docker-entrypoint-initdb.d:ro
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  energidata-ingest:
    build:
      context: .
      dockerfile: infra/docker/ingest.Dockerfile
    container_name: ca-energidata-ingest
    profiles:
      - jobs
    restart: "no"
    env_file:
      - .env
    environment:
      DW_HOST: postgres
      DW_PORT: 5432
    command:
      - sh
      - -c
      - python -m scripts.energidataservice_ingest --db-password "$$(cat /run/secrets/postgres_password)"
    secrets:
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy

  power-price-transform:
    image: postgres:16
    container_name: ca-power-price-transform
    profiles:
      - jobs
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./infra/sql/transform:/sql/transform:ro
    command:
      - sh
      - -c
      - export PGPASSWORD="$$(cat /run/secrets/postgres_password)" && psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -f /sql/transform/001_refresh_power_price_15min.sql
    secrets:
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy

  mqtt:
    image: eclipse-mosquitto:2
    container_name: ca-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_BIND_ADDRESS:-127.0.0.1}:1883:1883"
      - "${MQTT_WS_BIND_ADDRESS:-127.0.0.1}:9001:9001"
    volumes:
      - ./infra/mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  mqtt-ingest:
    build:
      context: .
      dockerfile: infra/docker/ingest.Dockerfile
    container_name: ca-mqtt-ingest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_TOPIC: ca/dev/+/telemetry
      MQTT_QOS: 1
      MQTT_SOURCE: phone_or_esp32
      DW_HOST: postgres
      DW_PORT: 5432
    command:
      - sh
      - -c
      - python -m scripts.mqtt_ingest --db-password "$$(cat /run/secrets/postgres_password)"
    secrets:
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ca-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    entrypoint:
      - /bin/sh
      - -c
      - export POSTGRES_PASSWORD="$$(cat /run/secrets/postgres_password)" && exec /run.sh
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    secrets:
      - postgres_password
      - grafana_admin_password
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:v0.53.7
    container_name: ca-metabase
    restart: unless-stopped
    ports:
      - "${METABASE_BIND_ADDRESS:-127.0.0.1}:3001:3000"
    environment:
      MB_DB_TYPE: ${MB_DB_TYPE}
      MB_DB_DBNAME: ${MB_DB_DBNAME}
      MB_DB_PORT: ${MB_DB_PORT}
      MB_DB_USER: ${MB_DB_USER}
      MB_DB_HOST: ${MB_DB_HOST}
    entrypoint:
      - /bin/sh
      - -c
      - export MB_DB_PASS="$$(cat /run/secrets/postgres_password)" && exec /app/run_metabase.sh
    secrets:
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:
  mosquitto_data:
  mosquitto_log:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./infra/secrets/postgres_password.secret}
  grafana_admin_password:
    file: ${GF_SECURITY_ADMIN_PASSWORD_FILE:-./infra/secrets/grafana_admin_password.secret}
