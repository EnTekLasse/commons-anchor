name: Mermaid Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-mermaid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Check generated Mermaid artifacts are in sync
        run: python scripts/generate_mermaid_from_model.py --check

      - name: Validate Mermaid blocks in README
        run: |
          awk '
            BEGIN { in_block=0; n=0 }
            /^```mermaid/ {
              in_block=1;
              n++;
              file=sprintf("/tmp/readme-diagram-%d.mmd", n);
              next
            }
            /^```/ && in_block {
              in_block=0;
              next
            }
            in_block {
              print >> file
            }
          ' README.md

          count=$(ls /tmp/readme-diagram-*.mmd 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "No Mermaid blocks found in README.md"
            exit 1
          fi

          for src in /tmp/readme-diagram-*.mmd; do
            out="${src%.mmd}.svg"
            echo "Validating $src"
            mmdc -i "$src" -o "$out"
          done
